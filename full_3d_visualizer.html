<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KCRO — Full Graph (208k, 3D point cloud)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #05070a; overflow: hidden;
                 font-family: monospace; color: #c9d1d9; }
    #c { display: block; width: 100vw; height: 100vh; }
    .panel { position: absolute; z-index: 10; background: rgba(13,17,23,0.85);
             border: 1px solid #30363d; border-radius: 6px; padding: 12px 14px; }
    #info { top: 16px; left: 16px; max-width: 360px; }
    #legend { bottom: 16px; left: 16px; }
    h1 { margin: 0 0 4px; font-size: 1.05rem; color: #58a6ff; }
    .sub { margin: 0; font-size: 0.78rem; color: #8b949e; }
    #status { margin-top: 8px; font-size: 0.75rem; color: #8b949e; }
    #hover { margin-top: 6px; font-size: 0.78rem; color: #e3b341; min-height: 1em;
             word-break: break-all; }
    .legend-row { font-size: 0.78rem; margin: 3px 0; }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%;
           margin-right: 7px; vertical-align: middle; }
    label { font-size: 0.75rem; color: #8b949e; }
  </style>
</head>
<body>
  <div id="info" class="panel">
    <h1>KCRO — Full Instance Graph (3D)</h1>
    <p class="sub">All 208,281 nodes &middot; 195,816 edges &middot; galaxy of 16,201 Pod-clusters</p>
    <div id="status">Loading…</div>
    <div id="hover"></div>
    <label><input type="checkbox" id="spin" checked> auto-rotate</label>
    &nbsp;<label><input type="checkbox" id="edges" checked> edges</label>
  </div>
  <div id="legend" class="panel">
    <div class="legend-row"><span class="dot" style="background:#ff7b72"></span>Vulnerability</div>
    <div class="legend-row"><span class="dot" style="background:#d2a8ff"></span>Relator</div>
    <div class="legend-row"><span class="dot" style="background:#58a6ff"></span>Object</div>
  </div>
  <canvas id="c"></canvas>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.184.0';
    import { OrbitControls } from 'https://esm.sh/three@0.184.0/examples/jsm/controls/OrbitControls.js';

    const COLORS = { // group code -> rgb 0..1
      0: [0.345, 0.651, 1.0],   // Object  #58a6ff
      1: [0.824, 0.659, 1.0],   // Relator #d2a8ff
      2: [1.0, 0.482, 0.447],   // Vuln    #ff7b72
    };
    const $ = id => document.getElementById(id);
    const status = $('status');

    (async () => {
      status.textContent = 'Fetching topology + precomputed layout…';
      const [data, posBuf] = await Promise.all([
        fetch('/full').then(r => r.json()),
        fetch('/full_positions.bin').then(r => r.arrayBuffer()),
      ]);
      const n = data.count, groups = data.groups, ids = data.ids, linkIdx = data.links;
      // First 4 bytes = node count header; the rest is Float32 xyz per node.
      const positions = new Float32Array(posBuf, 4, n * 3);

      // ---- scene / camera / renderer ----
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x05070a, 0.0015);
      const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 5000);
      camera.position.set(0, 0, 620);
      const renderer = new THREE.WebGLRenderer({ canvas: $('c'), antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.35;

      // ---- points (one draw call for all 208k) ----
      const colors = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) colors.set(COLORS[groups[i]] || COLORS[0], i * 3);
      const pGeo = new THREE.BufferGeometry();
      pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const points = new THREE.Points(pGeo, new THREE.PointsMaterial({
        size: 2.2, vertexColors: true, sizeAttenuation: true,
        transparent: true, opacity: 0.92,
        blending: THREE.AdditiveBlending, depthWrite: false,
      }));
      scene.add(points);

      // ---- edges (one draw call for all 196k) ----
      const E = linkIdx.length / 2;
      const linePos = new Float32Array(E * 2 * 3);
      for (let e = 0; e < E; e++) {
        const s = linkIdx[2 * e] * 3, t = linkIdx[2 * e + 1] * 3;
        const o = e * 6;
        linePos[o]   = positions[s];     linePos[o+1] = positions[s+1]; linePos[o+2] = positions[s+2];
        linePos[o+3] = positions[t];     linePos[o+4] = positions[t+1]; linePos[o+5] = positions[t+2];
      }
      const lGeo = new THREE.BufferGeometry();
      lGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
      const lines = new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({
        color: 0x4b5563, transparent: true, opacity: 0.10,
        blending: THREE.AdditiveBlending, depthWrite: false,
      }));
      scene.add(lines);

      // ---- picking ----
      const ray = new THREE.Raycaster();
      ray.params.Points.threshold = 3.5;
      const mouse = new THREE.Vector2();
      renderer.domElement.addEventListener('pointermove', ev => {
        mouse.x = (ev.clientX / innerWidth) * 2 - 1;
        mouse.y = -(ev.clientY / innerHeight) * 2 + 1;
        ray.setFromCamera(mouse, camera);
        const hit = ray.intersectObject(points, false)[0];
        $('hover').textContent = hit ? ids[hit.index] : '';
      });

      $('spin').onchange = e => controls.autoRotate = e.target.checked;
      $('edges').onchange = e => lines.visible = e.target.checked;
      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      status.textContent = `${n.toLocaleString()} nodes · ${E.toLocaleString()} edges · drag to orbit, scroll to zoom`;
      (function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      })();
    })().catch(e => { status.textContent = '⚠ ' + e.message; console.error(e); });
  </script>
</body>
</html>
